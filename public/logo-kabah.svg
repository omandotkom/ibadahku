<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background Circle with Green Gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#064e3b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle Background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>
  
  <!-- Ka'bah Structure -->
  <g transform="translate(50, 52)">
    <!-- Ka'bah Base -->
    <rect x="-22" y="-25" width="44" height="40" fill="#1a1a2e" rx="1"/>
    
    <!-- Ka'bah Top Border (Gold) -->
    <rect x="-23" y="-27" width="46" height="4" fill="url(#goldGrad)" rx="1"/>
    
    <!-- Ka'bah Side Detail -->
    <rect x="-22" y="-25" width="4" height="40" fill="#0f0f1a"/>
    
    <!-- The Black Kiswah Cloth Texture Lines -->
    <line x1="-15" y1="-25" x2="-15" y2="15" stroke="#2a2a3e" stroke-width="0.5"/>
    <line x1="-8" y1="-25" x2="-8" y2="15" stroke="#2a2a3e" stroke-width="0.5"/>
    <line x1="0" y1="-25" x2="0" y2="15" stroke="#2a2a3e" stroke-width="0.5"/>
    <line x1="8" y1="-25" x2="8" y2="15" stroke="#2a2a3e" stroke-width="0.5"/>
    <line x1="15" y1="-25" x2="15" y2="15" stroke="#2a2a3e" stroke-width="0.5"/>
    
    <!-- Gold embroidered band (Hizam) -->
    <rect x="-22" y="-10" width="44" height="6" fill="url(#goldGrad)"/>
    
    <!-- Door of Ka'bah -->
    <rect x="-6" y="-5" width="12" height="18" fill="#16213e" rx="1"/>
    <rect x="-4" y="-3" width="8" height="14" fill="#0f3460" rx="1"/>
    
    <!-- Door Frame (Gold) -->
    <rect x="-7" y="-6" width="14" height="1" fill="url(#goldGrad)"/>
    
    <!-- Base Platform -->
    <rect x="-25" y="15" width="50" height="6" fill="#e5e5e5" rx="1"/>
    <rect x="-25" y="19" width="50" height="2" fill="#d4af37" rx="1"/>
  </g>
  
  <!-- Decorative border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
</svg>